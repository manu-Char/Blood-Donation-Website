<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloodLink - Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="nav-logo"
        ><div class="logo-icon">🩸</div>
        BloodLink</a
      >
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="camps.html">Camps</a></li>
      </ul>
      <div class="nav-actions">
        <a href="register.html" class="btn btn-primary btn-sm">Register</a>
      </div>
      <button class="nav-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <div class="form-page">
      <div class="form-card" style="max-width: 420px">
        <div class="form-card-header">
          <div class="form-card-icon">🔐</div>
          <h2>Donor Login</h2>
          <p>Welcome back! Login to access your dashboard</p>
        </div>

        <form id="loginForm" method="POST" action="/login" novalidate>
          <div style="display: flex; flex-direction: column; gap: 18px">
            <div class="form-group">
              <label for="email"
                >Email Address <span class="required">*</span></label
              >
              <input
                type="email"
                id="loginEmail"
                name="email"
                placeholder="you@example.com"
              />
              <span class="field-error" id="loginEmailError"
                >Please enter your email address.</span
              >
            </div>

            <div class="form-group">
              <label for="password"
                >Password <span class="required">*</span></label
              >
              <input
                type="password"
                id="loginPassword"
                name="password"
                placeholder="Your password"
              />
              <span class="field-error" id="loginPasswordError"
                >Please enter your password.</span
              >
            </div>

            <button
              type="submit"
              class="btn btn-primary btn-full btn-lg"
              style="margin-top: 4px"
            >
              Login →
            </button>
          </div>
        </form>

        <p class="form-footer-text" style="margin-top: 16px">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
        <p class="form-footer-text">
          Admin? <a href="admin_login.html">Admin Login</a>
        </p>
      </div>
    </div>

    <script src="../js/script.js"></script>
  </body>
</html>
